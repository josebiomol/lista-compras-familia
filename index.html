<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F5F0;
    --ink: #1F2A24;
    --ink-soft: #5C6A62;
    --green: #2F6B4F;
    --mustard: #C99A2E;
    --line: #D8D3C6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #EAE6DC;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .receipt {
    background: var(--paper);
    width: 100%;
    max-width: 420px;
    padding: 28px 22px 22px;
    box-shadow: 0 12px 30px rgba(31,42,36,0.12);
    position: relative;
  }
  .receipt::before, .receipt::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 10px;
    background:
      radial-gradient(circle at 8px 5px, transparent 5px, var(--paper) 5px) repeat-x;
    background-size: 16px 10px;
  }
  .receipt::before { top: -5px; }
  .receipt::after { bottom: -5px; transform: rotate(180deg); }

  header { text-align: center; margin-bottom: 18px; }
  .store-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.5px;
    margin: 0;
  }
  .meta {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .meta .role {
    text-transform: uppercase;
    color: var(--green);
    font-weight: 500;
  }
  .logout {
    background: none;
    border: none;
    color: var(--ink-soft);
    text-decoration: underline;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-left: 6px;
  }
  .divider {
    border: none;
    border-top: 1px dashed var(--line);
    margin: 16px 0;
  }
  .navbar {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  .nav-btn {
    flex: 1;
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    padding: 8px 10px;
    font-size: 12px;
  }
  .nav-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
    cursor: default;
  }
  .nav-btn:not(.active):not(:disabled):hover { border-color: var(--green); color: var(--green); }

  .login-box { text-align: center; padding: 10px 0 4px; }
  .login-box p { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }
  .login-box form { display: flex; flex-direction: column; gap: 8px; }
  .login-box input { width: 100%; }
  .login-box button { width: 100%; padding: 11px; }

  form.add-item {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
  }
  form.add-item input[type="text"] {
    flex: 1;
    min-width: 0;
  }
  input[type="text"], input[type="email"], input[type="number"] {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--line);
    background: #fff;
    padding: 9px 10px;
    color: var(--ink);
  }
  input[type="number"] { width: 56px; }
  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--line);
    background: #fff;
    padding: 9px 10px;
    color: var(--ink);
  }
  input:focus { outline: 2px solid var(--green); outline-offset: 1px; }
  button {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 13px;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 9px 14px;
    cursor: pointer;
  }
  button:hover { background: #265a42; }
  button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  button:disabled { opacity: 0.6; cursor: default; }

  ul.items { list-style: none; margin: 0; padding: 0; }
  .item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px dotted var(--line);
    font-size: 13px;
  }
  .item .check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--ink-soft);
    flex-shrink: 0;
    cursor: pointer;
    border-radius: 2px;
    background: transparent;
    padding: 0;
  }
  .item.done .check { background: var(--green); border-color: var(--green); }
  .item .name {
    flex: 1;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item.done .name { text-decoration: line-through; color: var(--ink-soft); }
  .item .qty { color: var(--mustard); font-weight: 500; }
  .item.done .qty { color: var(--ink-soft); }
  .item .delete {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0 0 0 4px;
    flex-shrink: 0;
  }
  .item .delete:hover { color: #A23B2E; }

  .totals {
    margin-top: 16px;
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
  }
  .empty, .status-msg {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    padding: 24px 0;
  }
  .error { color: #A23B2E; }
  .hidden { display: none; }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--ink-soft);
    letter-spacing: 0.5px;
    margin: 0 0 10px;
  }
  ul.members { list-style: none; margin: 0 0 14px; padding: 0; }
  .members li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px dotted var(--line);
  }
  .members .m-info { flex: 1; min-width: 0; }
  .members .m-name { display: block; }
  .members .m-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .members .m-actions button {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }
  .members .m-actions button:hover { color: var(--green); }
  .members .m-actions .m-delete:hover { color: #A23B2E; }
  .members .m-role {
    color: var(--green);
    font-size: 11px;
    text-transform: uppercase;
  }
  .invite-btn {
    width: 100%;
    background: transparent;
    color: var(--green);
    border: 1px dashed var(--green);
  }
  .invite-btn:hover { background: rgba(47,107,79,0.08); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(31,42,36,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 10;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--paper);
    width: 100%;
    max-width: 360px;
    padding: 20px;
    box-shadow: 0 16px 40px rgba(31,42,36,0.25);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .modal-close:hover { color: var(--ink); }
  #addMemberForm {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #addMemberForm button { width: 100%; }
</style>
</head>
<body>

<div class="receipt">
  <header>
    <p class="store-name">Lista de Compras</p>
    <p class="meta" id="userMeta"></p>
  </header>

  <nav class="navbar hidden" id="navbar">
    <button type="button" class="nav-btn active" disabled>🛒 lista</button>
    <button type="button" class="nav-btn hidden" id="navMembersBtn">👥 membros</button>
  </nav>

  <hr class="divider">

  <div id="loginScreen" class="login-box">
    <p>Digite o email cadastrado pra entrar na lista da sua casa.</p>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="seuemail@gmail.com" required>
      <button type="submit">Entrar</button>
    </form>
    <p class="status-msg error hidden" id="loginError"></p>
  </div>

  <div id="appScreen" class="hidden">
    <form class="add-item" id="addForm">
      <input type="text" id="itemName" placeholder="item" required>
      <input type="number" id="itemQty" value="1" min="1" required>
      <button type="submit">+ add</button>
    </form>

    <div id="content">
      <p class="status-msg">carregando lista...</p>
    </div>

    <div class="totals" id="totals" style="display:none;">
      <span id="pendingCount">0 pendentes</span>
      <span id="doneCount">0 comprados</span>
    </div>
  </div>
</div>

<div id="membersModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <p class="section-title" style="margin:0;">membros da casa</p>
      <button type="button" id="closeMembersBtn" class="modal-close" aria-label="fechar">×</button>
    </div>
    <ul class="members" id="membersList"></ul>
    <button type="button" id="openInviteBtn" class="invite-btn">+ convidar membro</button>
  </div>
</div>

<div id="inviteModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <p class="section-title" style="margin:0;" id="memberFormTitle">convidar membro</p>
      <button type="button" id="closeInviteBtn" class="modal-close" aria-label="fechar">×</button>
    </div>
    <form id="addMemberForm">
      <input type="hidden" id="memberFormId" value="">
      <input type="text" id="memberName" placeholder="nome" required>
      <input type="email" id="memberEmail" placeholder="email" required>
      <select id="memberRole">
        <option value="membro">membro</option>
        <option value="admin">admin</option>
      </select>
      <button type="submit" id="memberFormSubmit">+ convidar</button>
    </form>
    <p class="status-msg error hidden" id="memberError"></p>
  </div>
</div>

<script>
  // Cole aqui a URL do seu Web App (terminada em /exec)
  const API_URL = 'https://script.google.com/macros/s/AKfycbxaLtifLTTakDmk5ga1ueBjQn9UpCi0291sx9d4DX-VEUMilsWQnpQNYufO7aEIgw0/exec';

  const userMeta = document.getElementById('userMeta');
  const content = document.getElementById('content');
  const totals = document.getElementById('totals');
  const pendingCount = document.getElementById('pendingCount');
  const doneCount = document.getElementById('doneCount');
  const addForm = document.getElementById('addForm');
  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const navbar = document.getElementById('navbar');
  const navMembersBtn = document.getElementById('navMembersBtn');
  const membersModal = document.getElementById('membersModal');
  const closeMembersBtn = document.getElementById('closeMembersBtn');
  const membersList = document.getElementById('membersList');
  const addMemberForm = document.getElementById('addMemberForm');
  const memberError = document.getElementById('memberError');
  const inviteModal = document.getElementById('inviteModal');
  const openInviteBtn = document.getElementById('openInviteBtn');
  const closeInviteBtn = document.getElementById('closeInviteBtn');

  let currentEmail = localStorage.getItem('userEmail') || '';
  let currentRole = '';
  let currentMembers = [];

  // Carrega dados do Apps Script via JSONP (contorna o bloqueio de CORS)
  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const callbackName = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      const script = document.createElement('script');

      const cleanup = () => {
        delete window[callbackName];
        script.remove();
      };

      window[callbackName] = (data) => {
        resolve(data);
        cleanup();
      };

      script.onerror = () => {
        reject(new Error('Falha de rede'));
        cleanup();
      };

      script.src = `${url}&callback=${callbackName}`;
      document.body.appendChild(script);
    });
  }

  async function loadItems() {
    try {
      const data = await jsonp(`${API_URL}?action=getItems&email=${encodeURIComponent(currentEmail)}`);

      if (data.error) {
        localStorage.removeItem('userEmail');
        currentEmail = '';
        showLogin(data.error);
        return;
      }

      showApp(data);
    } catch (err) {
      content.innerHTML = `<p class="status-msg error">Não foi possível conectar à API.</p>`;
      appScreen.classList.remove('hidden');
      loginScreen.classList.add('hidden');
    }
  }

  function showLogin(errorMsg) {
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
    navbar.classList.add('hidden');
    userMeta.textContent = '';
    if (errorMsg) {
      loginError.textContent = errorMsg;
      loginError.classList.remove('hidden');
    }
  }

  function showApp(data) {
    loginScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
    navbar.classList.remove('hidden');
    currentRole = data.user.role;
    userMeta.innerHTML = `${data.user.nome} · <span class="role">${data.user.role}</span> <button class="logout" id="logoutBtn">sair</button>`;
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('userEmail');
      currentEmail = '';
      showLogin();
    });
    renderItems(data.items);

    if (data.user.role === 'admin' && data.members) {
      navMembersBtn.classList.remove('hidden');
      currentMembers = data.members;
      renderMembers(currentMembers);
    } else {
      navMembersBtn.classList.add('hidden');
    }
  }

  function renderMembers(members) {
    membersList.innerHTML = members.map(m => `
      <li>
        <div class="m-info">
          <span class="m-name">${m.nome}</span>
          <span class="m-role">${m.role}</span>
        </div>
        <div class="m-actions">
          <button type="button" class="m-edit" data-id="${m.user_id}" aria-label="editar">✎</button>
          <button type="button" class="m-delete" data-id="${m.user_id}" aria-label="excluir">×</button>
        </div>
      </li>
    `).join('');

    membersList.querySelectorAll('.m-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const member = currentMembers.find(m => String(m.user_id) === btn.dataset.id);
        if (member) openMemberForm(member);
      });
    });

    membersList.querySelectorAll('.m-delete').forEach(btn => {
      btn.addEventListener('click', () => deleteMember(btn.dataset.id));
    });
  }

  function openMemberForm(member) {
    memberError.classList.add('hidden');
    document.getElementById('memberFormId').value = member ? member.user_id : '';
    document.getElementById('memberName').value = member ? member.nome : '';
    document.getElementById('memberEmail').value = member ? member.email : '';
    document.getElementById('memberRole').value = member ? member.role : 'membro';
    document.getElementById('memberFormTitle').textContent = member ? 'editar membro' : 'convidar membro';
    document.getElementById('memberFormSubmit').textContent = member ? 'salvar' : '+ convidar';
    membersModal.classList.add('hidden');
    inviteModal.classList.remove('hidden');
  }

  async function deleteMember(userId) {
    if (!confirm('Excluir este membro da casa?')) return;
    try {
      const result = await jsonp(`${API_URL}?action=deleteUser&user_id_target=${userId}&email=${encodeURIComponent(currentEmail)}`);
      if (result.error) {
        alert(result.error);
        return;
      }
      await loadItems();
      membersModal.classList.remove('hidden');
    } catch (err) {
      alert('Erro ao excluir membro.');
    }
  }

  function renderItems(items) {
    if (!items.length) {
      content.innerHTML = '<p class="empty">Nenhum item ainda. Adicione o primeiro acima.</p>';
      totals.style.display = 'none';
      return;
    }

    const ul = document.createElement('ul');
    ul.className = 'items';

    let pending = 0, done = 0;

    items.forEach(item => {
      const isDone = item.status === 'comprado';
      if (isDone) done++; else pending++;

      const li = document.createElement('li');
      li.className = 'item' + (isDone ? ' done' : '');
      li.innerHTML = `
        <button class="check" data-id="${item.item_id}" aria-label="marcar como comprado"></button>
        <span class="name" data-id="${item.item_id}">${item.nome_item}</span>
        <span class="qty">x${item.quantidade}</span>
        ${currentRole === 'admin' ? `<button class="delete" data-id="${item.item_id}" aria-label="excluir item">×</button>` : ''}
      `;
      ul.appendChild(li);
    });

    content.innerHTML = '';
    content.appendChild(ul);

    totals.style.display = 'flex';
    pendingCount.textContent = `${pending} pendente${pending !== 1 ? 's' : ''}`;
    doneCount.textContent = `${done} comprado${done !== 1 ? 's' : ''}`;

    content.querySelectorAll('.check, .name').forEach(el => {
      el.addEventListener('click', () => toggleItem(el.dataset.id));
    });

    content.querySelectorAll('.delete').forEach(el => {
      el.addEventListener('click', () => deleteItem(el.dataset.id));
    });
  }

  async function toggleItem(itemId) {
    // Atualiza a tela na hora (otimista), sem esperar o servidor
    const li = content.querySelector(`.item .check[data-id="${itemId}"]`)?.closest('.item');
    if (li) li.classList.toggle('done');

    try {
      await jsonp(`${API_URL}?action=toggleItem&item_id=${itemId}&email=${encodeURIComponent(currentEmail)}`);
      loadItems(); // sincroniza de verdade em segundo plano (silencioso)
    } catch (err) {
      if (li) li.classList.toggle('done'); // desfaz se der erro
      alert('Erro ao atualizar item.');
    }
  }

  async function deleteItem(itemId) {
    if (!confirm('Excluir este item da lista?')) return;
    try {
      const result = await jsonp(`${API_URL}?action=deleteItem&item_id=${itemId}&email=${encodeURIComponent(currentEmail)}`);
      if (result.error) {
        alert(result.error);
        return;
      }
      loadItems();
    } catch (err) {
      alert('Erro ao excluir item.');
    }
  }

  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = document.getElementById('itemName').value.trim();
    const qty = document.getElementById('itemQty').value;
    if (!nome) return;

    try {
      await jsonp(`${API_URL}?action=addItem&nome_item=${encodeURIComponent(nome)}&quantidade=${qty}&email=${encodeURIComponent(currentEmail)}`);
      document.getElementById('itemName').value = '';
      document.getElementById('itemQty').value = 1;
      loadItems();
    } catch (err) {
      alert('Erro ao adicionar item.');
    }
  });

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    loginError.classList.add('hidden');
    currentEmail = document.getElementById('loginEmail').value.trim();
    localStorage.setItem('userEmail', currentEmail);
    loadItems();
  });

  navMembersBtn.addEventListener('click', () => {
    renderMembers(currentMembers);
    membersModal.classList.remove('hidden');
  });

  closeMembersBtn.addEventListener('click', () => {
    membersModal.classList.add('hidden');
  });

  membersModal.addEventListener('click', (e) => {
    if (e.target === membersModal) membersModal.classList.add('hidden');
  });

  openInviteBtn.addEventListener('click', () => {
    openMemberForm(null);
  });

  closeInviteBtn.addEventListener('click', () => {
    inviteModal.classList.add('hidden');
    membersModal.classList.remove('hidden');
  });

  inviteModal.addEventListener('click', (e) => {
    if (e.target === inviteModal) {
      inviteModal.classList.add('hidden');
      membersModal.classList.remove('hidden');
    }
  });

  addMemberForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    memberError.classList.add('hidden');

    const editingId = document.getElementById('memberFormId').value;
    const nome = document.getElementById('memberName').value.trim();
    const email = document.getElementById('memberEmail').value.trim();
    const role = document.getElementById('memberRole').value;
    if (!nome || !email) return;

    const action = editingId ? 'updateUser' : 'addUser';
    const idParam = editingId ? `&user_id_target=${editingId}` : '';

    try {
      const result = await jsonp(`${API_URL}?action=${action}${idParam}&novo_nome=${encodeURIComponent(nome)}&novo_email=${encodeURIComponent(email)}&novo_role=${role}&email=${encodeURIComponent(currentEmail)}`);

      if (result.error) {
        memberError.textContent = result.error;
        memberError.classList.remove('hidden');
        return;
      }

      addMemberForm.reset();
      document.getElementById('memberFormId').value = '';
      inviteModal.classList.add('hidden');
      await loadItems();
      membersModal.classList.remove('hidden');
    } catch (err) {
      memberError.textContent = editingId ? 'Erro ao salvar membro.' : 'Erro ao convidar membro.';
      memberError.classList.remove('hidden');
    }
  });

  if (currentEmail) {
    loadItems();
  } else {
    showLogin();
  }
</script>

</body>
</html>

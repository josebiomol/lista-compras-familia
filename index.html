<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F3F1;
    --card: #FFFFFF;
    --text: #16181B;
    --text-soft: #6B7280;
    --border: #E7E8E6;
    --green: #16A34A;
    --green-bg: #E7F6EC;
    --danger: #DC2626;
    --shadow: 0 1px 2px rgba(16,18,20,0.04), 0 8px 24px rgba(16,18,20,0.06);
  }
  [data-theme="dark"] {
    --bg: #131417;
    --card: #1C1E22;
    --text: #F2F3F1;
    --text-soft: #8A8F98;
    --border: #2A2D32;
    --green: #22C55E;
    --green-bg: rgba(34,197,94,0.14);
    --danger: #F87171;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
  }
  .app {
    width: 100%;
    max-width: 440px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 10px;
  }
  .app-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 19px;
    margin: 0;
  }
  .topbar-actions { display: flex; align-items: center; gap: 10px; position: relative; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--green);
    color: #fff;
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .account-menu {
    position: absolute;
    top: 44px;
    right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    border-radius: 12px;
    padding: 14px;
    min-width: 160px;
    z-index: 20;
  }
  .account-name { margin: 0; font-weight: 600; font-size: 14px; }
  .account-role {
    margin: 2px 0 12px;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--green);
    letter-spacing: 0.4px;
  }
  .account-logout {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }
  .account-logout:hover { border-color: var(--danger); color: var(--danger); }

  .login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
  }
  .login-icon {
    width: 64px; height: 64px;
    border-radius: 20px;
    background: var(--green-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 18px;
  }
  .login-screen h1 {
    font-family: 'Archivo', sans-serif;
    font-size: 22px;
    margin: 0 0 6px;
  }
  .login-screen p {
    color: var(--text-soft);
    font-size: 13px;
    margin: 0 0 28px;
    line-height: 1.5;
  }
  .login-screen form { width: 100%; display: flex; flex-direction: column; gap: 10px; }

  input[type="email"], input[type="text"], input[type="number"] {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 13px 14px;
    border-radius: 12px;
  }
  input:focus { outline: 2px solid var(--green); outline-offset: 1px; }
  ::placeholder { color: var(--text-soft); }

  button { font-family: 'Inter', sans-serif; cursor: pointer; }
  .btn-primary {
    width: 100%;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
  }
  .btn-primary:hover { filter: brightness(0.95); }

  .main { flex: 1; padding: 4px 20px 90px; }

  .add-bar {
    display: flex;
    gap: 8px;
    margin: 10px 0 16px;
  }
  .add-bar input { flex: 1; }
  .add-bar .qty-input { width: 56px; flex: none; text-align: center; }
  .add-btn {
    width: 46px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 20px;
    flex: none;
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
  }
  .tab {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-soft);
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab.active { background: var(--green-bg); color: var(--green); border-color: transparent; font-weight: 600; }
  .tab-count {
    background: rgba(120,120,120,0.15);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 11px;
  }
  .tab.active .tab-count { background: var(--green); color: #fff; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin: 18px 0 8px;
  }

  ul.items { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .item .check {
    width: 22px; height: 22px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: transparent;
    flex-shrink: 0;
    cursor: pointer;
    color: #fff;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .item.done .check { background: var(--green); border-color: var(--green); }
  .item .info { flex: 1; min-width: 0; cursor: pointer; }
  .item .name { display: block; font-weight: 600; font-size: 14px; }
  .item.done .name { text-decoration: line-through; color: var(--text-soft); }
  .item .qty-badge {
    background: var(--bg);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    flex-shrink: 0;
  }
  .item .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--green-bg);
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
    font-family: 'Archivo', sans-serif;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .item .delete {
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 17px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
  }
  .item .delete:hover { color: var(--danger); }

  .empty, .status-msg {
    text-align: center;
    font-size: 13px;
    color: var(--text-soft);
    padding: 32px 0;
  }
  .error { color: var(--danger); }
  .hidden { display: none !important; }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 14px;
  }
  .nav-item {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-soft);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    cursor: pointer;
  }
  .nav-item.active { color: var(--green); }
  .nav-icon { font-size: 18px; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 30;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--card);
    color: var(--text);
    width: 100%;
    max-width: 360px;
    padding: 22px;
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .modal-title { font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 16px; margin: 0; }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 18px;
    cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }

  select {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 13px 14px;
    border-radius: 12px;
  }
  #addMemberForm { display: flex; flex-direction: column; gap: 10px; }

  ul.members { list-style: none; margin: 0 0 16px; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .members li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--bg);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .members .m-name { display: block; font-weight: 600; font-size: 13.5px; }
  .members .m-role { font-size: 11px; color: var(--green); text-transform: uppercase; }
  .members .m-actions { display: flex; gap: 10px; flex-shrink: 0; }
  .members .m-actions button {
    background: none; border: none; color: var(--text-soft); cursor: pointer; font-size: 14px;
  }
  .members .m-actions .m-delete:hover { color: var(--danger); }
  .members .m-actions .m-edit:hover { color: var(--green); }

  .invite-btn {
    width: 100%;
    background: var(--green-bg);
    color: var(--green);
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
  }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    font-size: 13px;
    font-weight: 500;
    padding: 11px 18px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    z-index: 50;
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <h1 class="app-title">🛍️ Lista de Compras</h1>
    <div class="topbar-actions">
      <button type="button" id="themeToggle" class="icon-btn" aria-label="alternar tema">🌙</button>
      <button type="button" id="avatarBtn" class="avatar-btn hidden" aria-label="conta"></button>
      <div id="accountMenu" class="account-menu hidden">
        <p class="account-name" id="accountName"></p>
        <p class="account-role" id="accountRole"></p>
        <button type="button" id="logoutBtn" class="account-logout">Sair</button>
      </div>
    </div>
  </header>

  <div id="loginScreen" class="login-screen">
    <div class="login-icon">🛍️</div>
    <h1>Lista de Compras</h1>
    <p>Organize as compras da sua casa com sua família.</p>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Seu e-mail cadastrado" required>
      <button type="submit" class="btn-primary">Entrar</button>
    </form>
    <p class="status-msg error hidden" id="loginError"></p>
  </div>

  <main id="appScreen" class="main hidden">
    <form class="add-bar" id="addForm">
      <input type="text" id="itemName" placeholder="Adicionar item..." required>
      <input type="number" id="itemQty" value="1" min="1" class="qty-input" required>
      <button type="submit" class="add-btn" aria-label="adicionar">+</button>
    </form>

    <div class="tabs" id="filterTabs">
      <button type="button" class="tab active" data-filter="todos">Todos <span class="tab-count" id="countTodos">0</span></button>
      <button type="button" class="tab" data-filter="pendentes">Pendentes <span class="tab-count" id="countPendentes">0</span></button>
      <button type="button" class="tab" data-filter="comprados">Comprados <span class="tab-count" id="countComprados">0</span></button>
    </div>

    <div id="content">
      <p class="status-msg">carregando lista...</p>
    </div>
  </main>

  <nav class="bottom-nav hidden" id="bottomNav">
    <button type="button" class="nav-item active" disabled>
      <span class="nav-icon">🛒</span><span>Lista</span>
    </button>
    <button type="button" class="nav-item hidden" id="navMembersBtn">
      <span class="nav-icon">👥</span><span>Membros</span>
    </button>
  </nav>
</div>

<div id="membersModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <p class="modal-title">Membros da casa</p>
      <button type="button" id="closeMembersBtn" class="modal-close" aria-label="fechar">×</button>
    </div>
    <ul class="members" id="membersList"></ul>
    <button type="button" id="openInviteBtn" class="invite-btn">+ Convidar membro</button>
  </div>
</div>

<div id="inviteModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <p class="modal-title" id="memberFormTitle">Convidar membro</p>
      <button type="button" id="closeInviteBtn" class="modal-close" aria-label="fechar">×</button>
    </div>
    <form id="addMemberForm">
      <input type="hidden" id="memberFormId" value="">
      <input type="text" id="memberName" placeholder="Nome completo" required>
      <input type="email" id="memberEmail" placeholder="email@exemplo.com" required>
      <select id="memberRole">
        <option value="membro">Membro</option>
        <option value="admin">Admin</option>
      </select>
      <button type="submit" id="memberFormSubmit" class="btn-primary">Convidar membro</button>
    </form>
    <p class="status-msg error hidden" id="memberError"></p>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxaLtifLTTakDmk5ga1ueBjQn9UpCi0291sx9d4DX-VEUMilsWQnpQNYufO7aEIgw0/exec';

  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const addForm = document.getElementById('addForm');
  const content = document.getElementById('content');
  const filterTabs = document.getElementById('filterTabs');
  const countTodos = document.getElementById('countTodos');
  const countPendentes = document.getElementById('countPendentes');
  const countComprados = document.getElementById('countComprados');
  const bottomNav = document.getElementById('bottomNav');
  const navMembersBtn = document.getElementById('navMembersBtn');
  const avatarBtn = document.getElementById('avatarBtn');
  const accountMenu = document.getElementById('accountMenu');
  const accountName = document.getElementById('accountName');
  const accountRole = document.getElementById('accountRole');
  const logoutBtn = document.getElementById('logoutBtn');
  const themeToggle = document.getElementById('themeToggle');
  const membersModal = document.getElementById('membersModal');
  const closeMembersBtn = document.getElementById('closeMembersBtn');
  const membersList = document.getElementById('membersList');
  const openInviteBtn = document.getElementById('openInviteBtn');
  const inviteModal = document.getElementById('inviteModal');
  const closeInviteBtn = document.getElementById('closeInviteBtn');
  const addMemberForm = document.getElementById('addMemberForm');
  const memberError = document.getElementById('memberError');
  const toast = document.getElementById('toast');

  let currentEmail = localStorage.getItem('userEmail') || '';
  let currentRole = '';
  let currentMembers = [];
  let currentItems = [];
  let activeFilter = 'todos';
  let toastTimer;

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.remove('hidden');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.add('hidden'), 2800);
  }

  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(' ');
    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const callbackName = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      const script = document.createElement('script');
      const cleanup = () => { delete window[callbackName]; script.remove(); };
      window[callbackName] = (data) => { resolve(data); cleanup(); };
      script.onerror = () => { reject(new Error('Falha de rede')); cleanup(); };
      script.src = `${url}&callback=${callbackName}`;
      document.body.appendChild(script);
    });
  }

  async function loadItems() {
    try {
      const data = await jsonp(`${API_URL}?action=getItems&email=${encodeURIComponent(currentEmail)}`);
      if (data.error) {
        localStorage.removeItem('userEmail');
        currentEmail = '';
        showLogin(data.error);
        return;
      }
      showApp(data);
    } catch (err) {
      content.innerHTML = `<p class="status-msg error">Não foi possível conectar à API.</p>`;
      appScreen.classList.remove('hidden');
      loginScreen.classList.add('hidden');
    }
  }

  function showLogin(errorMsg) {
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
    bottomNav.classList.add('hidden');
    avatarBtn.classList.add('hidden');
    accountMenu.classList.add('hidden');
    if (errorMsg) {
      loginError.textContent = errorMsg;
      loginError.classList.remove('hidden');
    }
  }

  function showApp(data) {
    loginScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
    bottomNav.classList.remove('hidden');
    currentRole = data.user.role;

    avatarBtn.textContent = initials(data.user.nome);
    avatarBtn.classList.remove('hidden');
    accountName.textContent = data.user.nome;
    accountRole.textContent = data.user.role;

    currentItems = data.items;
    renderFiltered();

    if (data.user.role === 'admin' && data.members) {
      navMembersBtn.classList.remove('hidden');
      currentMembers = data.members;
      renderMembers(currentMembers);
    } else {
      navMembersBtn.classList.add('hidden');
    }
  }

  avatarBtn.addEventListener('click', () => accountMenu.classList.toggle('hidden'));
  document.addEventListener('click', (e) => {
    if (!accountMenu.contains(e.target) && e.target !== avatarBtn) accountMenu.classList.add('hidden');
  });
  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('userEmail');
    currentEmail = '';
    accountMenu.classList.add('hidden');
    showLogin();
  });

  filterTabs.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    filterTabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
    renderFiltered();
  });

  function renderFiltered() {
    const pending = currentItems.filter(i => i.status !== 'comprado');
    const done = currentItems.filter(i => i.status === 'comprado');

    countTodos.textContent = currentItems.length;
    countPendentes.textContent = pending.length;
    countComprados.textContent = done.length;

    if (!currentItems.length) {
      content.innerHTML = '<p class="empty">Nenhum item ainda.<br>Adicione o primeiro acima.</p>';
      return;
    }

    let html = '';
    if (activeFilter !== 'comprados' && pending.length) {
      html += '<p class="section-label">Pendentes</p>' + renderItemGroup(pending);
    }
    if (activeFilter !== 'pendentes' && done.length) {
      html += '<p class="section-label">Comprados</p>' + renderItemGroup(done);
    }
    content.innerHTML = html || '<p class="empty">Nada por aqui nesse filtro.</p>';

    content.querySelectorAll('.check, .info').forEach(el => {
      el.addEventListener('click', () => toggleItem(el.dataset.id));
    });
    content.querySelectorAll('.delete').forEach(el => {
      el.addEventListener('click', () => deleteItemAction(el.dataset.id));
    });
  }

  function renderItemGroup(items) {
    return '<ul class="items">' + items.map(item => {
      const isDone = item.status === 'comprado';
      const owner = currentMembers.find(m => String(m.user_id) === String(item.user_id));
      const avatarHtml = owner ? `<span class="avatar">${initials(owner.nome)}</span>` : '';
      return `
        <li class="item${isDone ? ' done' : ''}">
          <button class="check" data-id="${item.item_id}" aria-label="marcar como comprado">${isDone ? '✓' : ''}</button>
          <div class="info" data-id="${item.item_id}">
            <span class="name">${item.nome_item}</span>
          </div>
          <span class="qty-badge">x${item.quantidade}</span>
          ${avatarHtml}
          ${currentRole === 'admin' ? `<button class="delete" data-id="${item.item_id}" aria-label="excluir">×</button>` : ''}
        </li>
      `;
    }).join('') + '</ul>';
  }

  async function toggleItem(itemId) {
    const item = currentItems.find(i => String(i.item_id) === String(itemId));
    if (item) item.status = item.status === 'comprado' ? 'pendente' : 'comprado';
    renderFiltered();

    try {
      await jsonp(`${API_URL}?action=toggleItem&item_id=${itemId}&email=${encodeURIComponent(currentEmail)}`);
      loadItems();
    } catch (err) {
      if (item) item.status = item.status === 'comprado' ? 'pendente' : 'comprado';
      renderFiltered();
      alert('Erro ao atualizar item.');
    }
  }

  async function deleteItemAction(itemId) {
    if (!confirm('Excluir este item da lista?')) return;
    try {
      await jsonp(`${API_URL}?action=deleteItem&item_id=${itemId}&email=${encodeURIComponent(currentEmail)}`);
      showToast('Item excluído.');
      loadItems();
    } catch (err) {
      alert('Erro ao excluir item.');
    }
  }

  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = document.getElementById('itemName').value.trim();
    const qty = document.getElementById('itemQty').value;
    if (!nome) return;

    try {
      await jsonp(`${API_URL}?action=addItem&nome_item=${encodeURIComponent(nome)}&quantidade=${qty}&email=${encodeURIComponent(currentEmail)}`);
      document.getElementById('itemName').value = '';
      document.getElementById('itemQty').value = 1;
      loadItems();
    } catch (err) {
      alert('Erro ao adicionar item.');
    }
  });

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    loginError.classList.add('hidden');
    currentEmail = document.getElementById('loginEmail').value.trim();
    localStorage.setItem('userEmail', currentEmail);
    loadItems();
  });

  navMembersBtn.addEventListener('click', () => {
    renderMembers(currentMembers);
    membersModal.classList.remove('hidden');
  });
  closeMembersBtn.addEventListener('click', () => membersModal.classList.add('hidden'));
  membersModal.addEventListener('click', (e) => {
    if (e.target === membersModal) membersModal.classList.add('hidden');
  });

  function renderMembers(members) {
    membersList.innerHTML = members.map(m => `
      <li>
        <div>
          <span class="m-name">${m.nome}</span>
          <span class="m-role">${m.role}</span>
        </div>
        <div class="m-actions">
          <button type="button" class="m-edit" data-id="${m.user_id}" aria-label="editar">✎</button>
          <button type="button" class="m-delete" data-id="${m.user_id}" aria-label="excluir">×</button>
        </div>
      </li>
    `).join('');

    membersList.querySelectorAll('.m-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const member = currentMembers.find(m => String(m.user_id) === btn.dataset.id);
        if (member) openMemberForm(member);
      });
    });
    membersList.querySelectorAll('.m-delete').forEach(btn => {
      btn.addEventListener('click', () => deleteMember(btn.dataset.id));
    });
  }

  function openMemberForm(member) {
    memberError.classList.add('hidden');
    document.getElementById('memberFormId').value = member ? member.user_id : '';
    document.getElementById('memberName').value = member ? member.nome : '';
    document.getElementById('memberEmail').value = member ? member.email : '';
    document.getElementById('memberRole').value = member ? member.role : 'membro';
    document.getElementById('memberFormTitle').textContent = member ? 'Editar membro' : 'Convidar membro';
    document.getElementById('memberFormSubmit').textContent = member ? 'Salvar alterações' : 'Convidar membro';
    membersModal.classList.add('hidden');
    inviteModal.classList.remove('hidden');
  }

  async function deleteMember(userId) {
    if (!confirm('Excluir este membro da casa?')) return;
    try {
      const result = await jsonp(`${API_URL}?action=deleteUser&user_id_target=${userId}&email=${encodeURIComponent(currentEmail)}`);
      if (result.error) { alert(result.error); return; }
      await loadItems();
      membersModal.classList.remove('hidden');
      showToast('Membro excluído.');
    } catch (err) {
      alert('Erro ao excluir membro.');
    }
  }

  openInviteBtn.addEventListener('click', () => openMemberForm(null));
  closeInviteBtn.addEventListener('click', () => {
    inviteModal.classList.add('hidden');
    membersModal.classList.remove('hidden');
  });
  inviteModal.addEventListener('click', (e) => {
    if (e.target === inviteModal) {
      inviteModal.classList.add('hidden');
      membersModal.classList.remove('hidden');
    }
  });

  addMemberForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    memberError.classList.add('hidden');

    const editingId = document.getElementById('memberFormId').value;
    const nome = document.getElementById('memberName').value.trim();
    const email = document.getElementById('memberEmail').value.trim();
    const role = document.getElementById('memberRole').value;
    if (!nome || !email) return;

    const action = editingId ? 'updateUser' : 'addUser';
    const idParam = editingId ? `&user_id_target=${editingId}` : '';

    try {
      const result = await jsonp(`${API_URL}?action=${action}${idParam}&novo_nome=${encodeURIComponent(nome)}&novo_email=${encodeURIComponent(email)}&novo_role=${role}&email=${encodeURIComponent(currentEmail)}`);
      if (result.error) {
        memberError.textContent = result.error;
        memberError.classList.remove('hidden');
        return;
      }
      addMemberForm.reset();
      document.getElementById('memberFormId').value = '';
      inviteModal.classList.add('hidden');
      await loadItems();
      membersModal.classList.remove('hidden');
      showToast(editingId ? 'Membro atualizado.' : 'Membro cadastrado.');
    } catch (err) {
      memberError.textContent = editingId ? 'Erro ao salvar membro.' : 'Erro ao convidar membro.';
      memberError.classList.remove('hidden');
    }
  });

  if (currentEmail) {
    loadItems();
  } else {
    showLogin();
  }
</script>

</body>
</html>

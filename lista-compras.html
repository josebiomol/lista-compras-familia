<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F5F0;
    --ink: #1F2A24;
    --ink-soft: #5C6A62;
    --green: #2F6B4F;
    --mustard: #C99A2E;
    --line: #D8D3C6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #EAE6DC;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .receipt {
    background: var(--paper);
    width: 100%;
    max-width: 420px;
    padding: 28px 22px 22px;
    box-shadow: 0 12px 30px rgba(31,42,36,0.12);
    position: relative;
  }
  .receipt::before, .receipt::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 10px;
    background:
      radial-gradient(circle at 8px 5px, transparent 5px, var(--paper) 5px) repeat-x;
    background-size: 16px 10px;
  }
  .receipt::before { top: -5px; }
  .receipt::after { bottom: -5px; transform: rotate(180deg); }

  header { text-align: center; margin-bottom: 18px; }
  .store-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.5px;
    margin: 0;
  }
  .meta {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .meta .role {
    text-transform: uppercase;
    color: var(--green);
    font-weight: 500;
  }
  .logout {
    background: none;
    border: none;
    color: var(--ink-soft);
    text-decoration: underline;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-left: 6px;
  }
  .divider {
    border: none;
    border-top: 1px dashed var(--line);
    margin: 16px 0;
  }

  /* Login screen */
  .login-box { text-align: center; padding: 10px 0 4px; }
  .login-box p { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }
  .login-box form { display: flex; flex-direction: column; gap: 8px; }
  .login-box input { width: 100%; }
  .login-box button { width: 100%; padding: 11px; }

  form.add-item {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
  }
  form.add-item input[type="text"] {
    flex: 1;
    min-width: 0;
  }
  input[type="text"], input[type="email"], input[type="number"] {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--line);
    background: #fff;
    padding: 9px 10px;
    color: var(--ink);
  }
  input[type="number"] { width: 56px; }
  input:focus { outline: 2px solid var(--green); outline-offset: 1px; }
  button {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 13px;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 9px 14px;
    cursor: pointer;
  }
  button:hover { background: #265a42; }
  button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  ul.items { list-style: none; margin: 0; padding: 0; }
  .item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px dotted var(--line);
    font-size: 13px;
  }
  .item .check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--ink-soft);
    flex-shrink: 0;
    cursor: pointer;
    border-radius: 2px;
    background: transparent;
    padding: 0;
  }
  .item.done .check { background: var(--green); border-color: var(--green); }
  .item .name {
    flex: 1;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item.done .name { text-decoration: line-through; color: var(--ink-soft); }
  .item .qty { color: var(--mustard); font-weight: 500; }
  .item.done .qty { color: var(--ink-soft); }

  .totals {
    margin-top: 16px;
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
  }
  .empty, .status-msg {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    padding: 24px 0;
  }
  .error { color: #A23B2E; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="receipt">
  <header>
    <p class="store-name">Lista de Compras</p>
    <p class="meta" id="userMeta"></p>
  </header>

  <hr class="divider">

  <div id="loginScreen" class="login-box">
    <p>Digite o email cadastrado pra entrar na lista da sua casa.</p>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="seuemail@gmail.com" required>
      <button type="submit">Entrar</button>
    </form>
    <p class="status-msg error hidden" id="loginError"></p>
  </div>

  <div id="appScreen" class="hidden">
    <form class="add-item" id="addForm">
      <input type="text" id="itemName" placeholder="item" required>
      <input type="number" id="itemQty" value="1" min="1" required>
      <button type="submit">+ add</button>
    </form>

    <div id="content">
      <p class="status-msg">carregando lista...</p>
    </div>

    <div class="totals" id="totals" style="display:none;">
      <span id="pendingCount">0 pendentes</span>
      <span id="doneCount">0 comprados</span>
    </div>
  </div>
</div>

<script>
  // Cole aqui a URL do seu Web App (terminada em /exec)
  const API_URL = 'https://script.google.com/macros/s/AKfycbxaLtifLTTakDmk5ga1ueBjQn9UpCi0291sx9d4DX-VEUMilsWQnpQNYufO7aEIgw0/exec';

  const userMeta = document.getElementById('userMeta');
  const content = document.getElementById('content');
  const totals = document.getElementById('totals');
  const pendingCount = document.getElementById('pendingCount');
  const doneCount = document.getElementById('doneCount');
  const addForm = document.getElementById('addForm');
  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');

  let currentEmail = localStorage.getItem('userEmail') || '';

  async function loadItems() {
    try {
      const res = await fetch(`${API_URL}?action=getItems&email=${encodeURIComponent(currentEmail)}`);
      const data = await res.json();

      if (data.error) {
        // email inválido: limpa e volta pro login
        localStorage.removeItem('userEmail');
        currentEmail = '';
        showLogin(data.error);
        return;
      }

      showApp(data);
    } catch (err) {
      content.innerHTML = `<p class="status-msg error">Não foi possível conectar à API.</p>`;
      appScreen.classList.remove('hidden');
      loginScreen.classList.add('hidden');
    }
  }

  function showLogin(errorMsg) {
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
    userMeta.textContent = '';
    if (errorMsg) {
      loginError.textContent = errorMsg;
      loginError.classList.remove('hidden');
    }
  }

  function showApp(data) {
    loginScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
    userMeta.innerHTML = `${data.user.nome} · <span class="role">${data.user.role}</span> <button class="logout" id="logoutBtn">sair</button>`;
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('userEmail');
      currentEmail = '';
      showLogin();
    });
    renderItems(data.items);
  }

  function renderItems(items) {
    if (!items.length) {
      content.innerHTML = '<p class="empty">Nenhum item ainda. Adicione o primeiro acima.</p>';
      totals.style.display = 'none';
      return;
    }

    const ul = document.createElement('ul');
    ul.className = 'items';

    let pending = 0, done = 0;

    items.forEach(item => {
      const isDone = item.status === 'comprado';
      if (isDone) done++; else pending++;

      const li = document.createElement('li');
      li.className = 'item' + (isDone ? ' done' : '');
      li.innerHTML = `
        <button class="check" data-id="${item.item_id}" aria-label="marcar como comprado"></button>
        <span class="name" data-id="${item.item_id}">${item.nome_item}</span>
        <span class="qty">x${item.quantidade}</span>
      `;
      ul.appendChild(li);
    });

    content.innerHTML = '';
    content.appendChild(ul);

    totals.style.display = 'flex';
    pendingCount.textContent = `${pending} pendente${pending !== 1 ? 's' : ''}`;
    doneCount.textContent = `${done} comprado${done !== 1 ? 's' : ''}`;

    content.querySelectorAll('.check, .name').forEach(el => {
      el.addEventListener('click', () => toggleItem(el.dataset.id));
    });
  }

  async function toggleItem(itemId) {
    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'toggleItem', item_id: itemId, email: currentEmail })
      });
      loadItems();
    } catch (err) {
      alert('Erro ao atualizar item.');
    }
  }

  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = document.getElementById('itemName').value.trim();
    const qty = document.getElementById('itemQty').value;
    if (!nome) return;

    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'addItem', nome_item: nome, quantidade: qty, email: currentEmail })
      });
      document.getElementById('itemName').value = '';
      document.getElementById('itemQty').value = 1;
      loadItems();
    } catch (err) {
      alert('Erro ao adicionar item.');
    }
  });

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    loginError.classList.add('hidden');
    currentEmail = document.getElementById('loginEmail').value.trim();
    localStorage.setItem('userEmail', currentEmail);
    loadItems();
  });

  if (currentEmail) {
    loadItems();
  } else {
    showLogin();
  }
</script>

</body>
</html>
